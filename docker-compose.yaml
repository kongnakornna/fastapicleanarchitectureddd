name: "fastapi-clean-architecture-ddd-template"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-clean-architecture-ddd-template-api
    depends_on:
      database:
        condition: service_healthy
    expose:
      - "${APPLICATION_PORT}"
    networks:
      - fastapi-clean-architecture-ddd-template-network
    ports:
      - "${APPLICATION_PORT}:8000"
    restart: unless-stopped
    volumes:
      - ./:/app

  database:
    container_name: fastapi-clean-architecture-ddd-template-database
    environment:
      - "POSTGRES_DB=${POSTGRESQL_DATABASE}"
      - "POSTGRES_USER=${POSTGRESQL_USERNAME}"
      - "POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}"
    expose:
      - "${POSTGRESQL_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d \"$${POSTGRES_DB}\" -U \"$${POSTGRES_USER}\"" ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s
    image: "postgres:17.4-bullseye"
    networks:
      - fastapi-clean-architecture-ddd-template-network
    ports:
      - "${POSTGRESQL_PORT}:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  database-admin:
    image: "dpage/pgadmin4:9.2"
    container_name: teddy-ia-database-admin
    depends_on:
      database:
        condition: service_healthy
    environment:
      - "PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}"
      - "PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}"
    expose:
      - "${PGADMIN_PORT}"
    networks:
      - fastapi-clean-architecture-ddd-template-network
    ports:
      - "${PGADMIN_PORT}:80"
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  influxdb:
    image: "influxdb:2.7"
    container_name: fastapi-clean-architecture-ddd-template-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345678
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_TOKEN}"
    expose:
      - "8086"
    networks:
      - fastapi-clean-architecture-ddd-template-network
    ports:
      - "8086:8086"
    restart: unless-stopped
    volumes:
      - influxdb_data:/var/lib/influxdb2

  mosquitto:
    image: "eclipse-mosquitto:2"
    container_name: fastapi-clean-architecture-ddd-template-mosquitto
    expose:
      - "1883"
      - "9001"
    networks:
      - fastapi-clean-architecture-ddd-template-network
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  pgadmin_data:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:

networks:
  fastapi-clean-architecture-ddd-template-network:
    name: fastapi-clean-architecture-ddd-template-network
